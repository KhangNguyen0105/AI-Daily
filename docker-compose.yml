services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aidaily
      POSTGRES_PASSWORD: aidaily_dev
      POSTGRES_DB: aidaily
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidaily"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://aidaily:aidaily_dev@postgres:5432/aidaily
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker.Dockerfile
    environment:
      DATABASE_URL: postgresql://aidaily:aidaily_dev@postgres:5432/aidaily
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CRAWLEE_STORAGE_DIR: /tmp/crawlee-storage
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium-browser
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      MIMO_BASE_URL: ${MIMO_BASE_URL:-}
      MIMO_MODEL: ${MIMO_MODEL:-}
      AI_PROVIDER: ${AI_PROVIDER:-mimo}
      AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-openmodel}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENMODEL_API_KEY: ${OPENMODEL_API_KEY:-}
      OPENMODEL_BASE_URL: ${OPENMODEL_BASE_URL:-https://api.openmodel.ai/v1}
      OPENMODEL_MODEL: ${OPENMODEL_MODEL:-deepseek-v4-flash}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
