services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aidaily
      POSTGRES_PASSWORD: aidaily_dev
      POSTGRES_DB: aidaily
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidaily"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: worker.dev.Dockerfile
    environment:
      DATABASE_URL: postgresql://aidaily:aidaily_dev@postgres:5432/aidaily
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CRAWLEE_STORAGE_DIR: /tmp/crawlee-storage
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
